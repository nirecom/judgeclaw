# DNS forwarder for agent container
# Defense-in-depth: only whitelisted domains resolve; all others return NXDOMAIN
listen-address=172.24.0.253
bind-interfaces
user=root

# Block unlisted domains (return NXDOMAIN)
address=/#/

# Docker container names → Docker embedded DNS
server=/openclaw-bridge/127.0.0.11
server=/openclaw-sniproxy/127.0.0.11
server=/openclaw-ingress/127.0.0.11
server=/openclaw-litellm/127.0.0.11
server=/openclaw-agent/127.0.0.11
server=/openclaw-dns/127.0.0.11

# Whitelisted external domains → real DNS
server=/api.search.brave.com/8.8.8.8
server=/ja.wikipedia.org/8.8.8.8
server=/en.wikipedia.org/8.8.8.8
server=/wttr.in/8.8.8.8

# Don't read /etc/resolv.conf (prevents forwarding to host DNS)
no-resolv

# Logging
log-queries
