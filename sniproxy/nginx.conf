# SNI-based domain whitelist proxy for outbound HTTPS
# Runs as openclaw-sniproxy on internal (172.24.0.251) + external networks

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 128;
}

stream {
    resolver 127.0.0.11 valid=300s ipv6=off;
    resolver_timeout 5s;

    log_format snilog '$remote_addr [$time_local] '
                      'SNI=$ssl_preread_server_name '
                      'upstream=$upstream '
                      'status=$status '
                      'bytes_sent=$bytes_sent bytes_received=$bytes_received '
                      'session_time=$session_time';

    access_log /var/log/nginx/sni_access.log snilog;

    # Map SNI hostname to upstream target
    # Whitelisted domains pass through; everything else hits black hole
    map $ssl_preread_server_name $upstream {
        default                127.0.0.1:1;
        api.search.brave.com   api.search.brave.com:443;
        ja.wikipedia.org       ja.wikipedia.org:443;
        en.wikipedia.org       en.wikipedia.org:443;
        wttr.in                wttr.in:443;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $upstream;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
    }
}
