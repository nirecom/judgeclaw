networks:
  openclaw-internal:
    internal: true
    ipam:
      config:
        - subnet: 172.24.0.0/16
  openclaw-external: {}

services:
  openclaw-ingress:
    image: nginx:alpine
    container_name: openclaw-ingress
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - openclaw-internal
      - openclaw-external
    depends_on:
      - openclaw-agent

  openclaw-agent:
    build: ./openclaw-agent
    container_name: openclaw-agent
    user: "1000:1000"
    restart: unless-stopped
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_BASE_URL=http://openclaw-bridge:8080/v1
      - OPENAI_API_KEY=not-needed
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    volumes:
      - ./config/whitelist.txt:/etc/whitelist.txt:ro
      - ./openclaw:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-internal
    dns: 172.24.0.253
    depends_on:
      openclaw-bridge:
        condition: service_healthy
      openclaw-dns:
        condition: service_started

  openclaw-bridge:
    build: ./bridge
    container_name: openclaw-bridge
    restart: unless-stopped
    environment:
      - LITELLM_URL=http://openclaw-litellm:4000
      - JUDGE_MODEL_NAME=judge
      - PORTABLE_SERVER_URL=${PORTABLE_SERVER_URL:-}
      - JUDGE_PORTABLE_MODEL=${JUDGE_PORTABLE_MODEL:-Qwen2.5-7B-Instruct-Q4_K_M}
      - LOG_DIR=/var/log/openclaw
    volumes:
      - ./logs:/var/log/openclaw
    networks:
      - openclaw-internal
      - openclaw-external
    depends_on:
      openclaw-litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  openclaw-litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: openclaw-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4100}:4000"
    environment:
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL}
      - REASONER_LOCAL_MODEL=${REASONER_LOCAL_MODEL}
      - JUDGE_LOCAL_MODEL=${JUDGE_LOCAL_MODEL:-openai/Qwen2.5-7B-Instruct-Q4_K_M}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    networks:
      - openclaw-external
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-sniproxy:
    build: ./sniproxy
    container_name: openclaw-sniproxy
    restart: unless-stopped
    volumes:
      - ./config/whitelist.txt:/etc/whitelist.txt:ro
    networks:
      openclaw-internal:
        ipv4_address: 172.24.0.251
      openclaw-external: {}

  openclaw-dns:
    build: ./dns
    container_name: openclaw-dns
    restart: unless-stopped
    volumes:
      - ./config/whitelist.txt:/etc/whitelist.txt:ro
    networks:
      openclaw-internal:
        ipv4_address: 172.24.0.253
      openclaw-external: {}

  openclaw-egress:
    build: ./egress
    container_name: openclaw-egress
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:openclaw-agent"
    depends_on:
      - openclaw-agent
      - openclaw-sniproxy

  openclaw-watcher:
    image: docker:cli
    container_name: openclaw-watcher
    restart: unless-stopped
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/whitelist.txt:/etc/whitelist.txt:ro
    # Two responsibilities:
    # 1. Recreate openclaw-egress whenever openclaw-agent is recreated.
    #    docker restart fails because it caches the old agent container ID in network_mode.
    #    Use plain docker stop/rm/run to avoid compose project name conflicts.
    #    sleep 3: gives egress time to start on initial boot before we touch it.
    # 2. Restart agent/sniproxy/dns when whitelist.txt changes (poll every 5s).
    #    egress is then auto-recovered by responsibility 1 above.
    command:
      - sh
      - -c
      - |
        PREV=$$(sha256sum /etc/whitelist.txt | cut -d' ' -f1)
        echo "[watcher] watching whitelist.txt (hash: $$PREV)"
        while true; do
          sleep 5
          CURR=$$(sha256sum /etc/whitelist.txt | cut -d' ' -f1)
          if [ "$$CURR" != "$$PREV" ]; then
            echo "[watcher] whitelist.txt changed, restarting services"
            docker restart openclaw-agent openclaw-sniproxy openclaw-dns
            PREV=$$CURR
          fi
        done &
        docker events --filter event=start --filter container=openclaw-agent --format '{{.Actor.ID}}' \
        | while read id; do
            sleep 3
            echo '[watcher] openclaw-agent started, recreating openclaw-egress'
            docker stop openclaw-egress 2>/dev/null || true
            docker rm openclaw-egress 2>/dev/null || true
            docker run -d --name openclaw-egress --cap-add NET_ADMIN --cap-add NET_RAW --network container:openclaw-agent --restart unless-stopped judgeclaw-openclaw-egress
          done

  openclaw-sandbox:
    image: ghcr.io/openclaw/openclaw@sha256:0b2170d5ec3a487a6313ed0556d377c5c5c80a0f806043daa2e685a4bedd45e3
    container_name: openclaw-sandbox
    # TODO: When sandbox becomes active, switch to build: ./openclaw-agent
    user: "1000:1000"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    network_mode: "none"
    command: ["sleep", "infinity"]
