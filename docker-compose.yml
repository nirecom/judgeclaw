networks:
  openclaw-internal:
    internal: true
    ipam:
      config:
        - subnet: 172.24.0.0/16
  openclaw-external: {}

services:
  openclaw-ingress:
    image: nginx:alpine
    container_name: openclaw-ingress
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - openclaw-internal
      - openclaw-external
    depends_on:
      - openclaw-agent

  openclaw-agent:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-agent
    user: "1000:1000"
    restart: unless-stopped
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_BASE_URL=http://openclaw-bridge:8080/v1
      - OPENAI_API_KEY=not-needed
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    volumes:
      - ./openclaw:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-internal
    dns: 172.24.0.253
    depends_on:
      openclaw-bridge:
        condition: service_healthy
      openclaw-dns:
        condition: service_started

  openclaw-bridge:
    build: ./bridge
    container_name: openclaw-bridge
    restart: unless-stopped
    environment:
      - LITELLM_URL=http://openclaw-litellm:4000
      - JUDGE_MODEL_NAME=judge
      - PORTABLE_SERVER_URL=${PORTABLE_SERVER_URL:-}
      - JUDGE_PORTABLE_MODEL=${JUDGE_PORTABLE_MODEL:-Qwen2.5-7B-Instruct-Q4_K_M}
      - LOG_DIR=/var/log/openclaw
    volumes:
      - ./logs:/var/log/openclaw
    networks:
      - openclaw-internal
      - openclaw-external
    depends_on:
      openclaw-litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  openclaw-litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: openclaw-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4100}:4000"
    environment:
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL}
      - REASONER_LOCAL_MODEL=${REASONER_LOCAL_MODEL}
      - JUDGE_LOCAL_MODEL=${JUDGE_LOCAL_MODEL:-openai/Qwen2.5-7B-Instruct-Q4_K_M}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    networks:
      - openclaw-external
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-sniproxy:
    image: nginx:alpine
    container_name: openclaw-sniproxy
    restart: unless-stopped
    volumes:
      - ./sniproxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      openclaw-internal:
        ipv4_address: 172.24.0.251
      openclaw-external: {}

  openclaw-dns:
    build: ./dns
    container_name: openclaw-dns
    restart: unless-stopped
    volumes:
      - ./dns/whitelist.conf:/etc/dnsmasq.conf:ro
    networks:
      openclaw-internal:
        ipv4_address: 172.24.0.253
      openclaw-external: {}

  openclaw-egress:
    build: ./egress
    container_name: openclaw-egress
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:openclaw-agent"
    depends_on:
      - openclaw-agent
      - openclaw-sniproxy

  openclaw-sandbox:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-sandbox
    user: "1000:1000"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    network_mode: "none"
    command: ["sleep", "infinity"]
