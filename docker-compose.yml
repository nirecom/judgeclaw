services:
  openclaw-agent:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-agent
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_BASE_URL=http://openclaw-litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    depends_on:
      openclaw-litellm:
        condition: service_healthy

  openclaw-litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: openclaw-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4100}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL}
      - AGENT_MODEL=${AGENT_MODEL}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openclaw_config:
  openclaw_workspace:
